<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Focat Notification</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gaegu:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%;
      height: 100%;
      background: transparent;
      font-family: 'Gaegu', cursive;
      overflow: hidden;
      user-select: none;
    }

    .notification {
      position: absolute;
      bottom: 12px;
      right: 12px;
      width: 340px;
      background: #FFE656;
      border: 1.5px solid #5C4400;
      border-radius: 16px;
      padding: 14px 18px;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15), 0 2px 6px rgba(0, 0, 0, 0.08);
      opacity: 0;
      transform: translateY(20px) scale(0.95);
      animation: slideIn 0.4s ease forwards;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }

    .notification:hover {
      transform: translateY(-2px) scale(1.01);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.2), 0 3px 8px rgba(0, 0, 0, 0.1);
    }

    .notification:active {
      transform: translateY(0) scale(0.98);
    }

    .notification.closing {
      animation: slideOut 0.3s ease forwards;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(20px) scale(0.95); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    @keyframes slideOut {
      from { opacity: 1; transform: translateY(0) scale(1); }
      to   { opacity: 0; transform: translateY(20px) scale(0.95); }
    }

    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }

    .cat-icon {
      image-rendering: pixelated;
    }

    .label {
      font-size: 15px;
      font-weight: 700;
      color: #5C4400;
      letter-spacing: 1px;
      flex: 1;
    }

    .close-btn {
      background: none;
      border: none;
      font-size: 16px;
      color: #5C4400;
      cursor: pointer;
      padding: 2px 6px;
      border-radius: 6px;
      line-height: 1;
      opacity: 0.6;
      transition: opacity 0.15s, background 0.15s;
    }
    .close-btn:hover {
      opacity: 1;
      background: rgba(92, 68, 0, 0.1);
    }

    .message {
      font-size: 16px;
      font-weight: 700;
      color: #5C4400;
      line-height: 1.4;
      letter-spacing: 0.3px;
    }

    .hint {
      font-size: 12px;
      font-weight: 400;
      color: #9F8700;
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    /* Intensity pulsing for higher levels */
    .notification.level-2 {
      animation: slideIn 0.4s ease forwards, pulse 2s ease-in-out infinite 0.5s;
    }
    .notification.level-3 {
      animation: slideIn 0.4s ease forwards, angryShake 0.5s ease-in-out infinite 0.5s;
      border-width: 2px;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15); }
      50% { box-shadow: 0 4px 20px rgba(239, 203, 0, 0.5), 0 0 12px rgba(239, 203, 0, 0.3); }
    }

    @keyframes angryShake {
      0%, 100% { transform: translateX(0); }
      15% { transform: translateX(-2px); }
      30% { transform: translateX(2px); }
      45% { transform: translateX(-1px); }
      60% { transform: translateX(1px); }
    }
  </style>
</head>
<body>
  <div class="notification" id="notification" onclick="handleClick()">
    <div class="header">
      <!-- Pixel cat icon -->
      <svg class="cat-icon" width="24" height="24" viewBox="0 0 16 18" style="image-rendering: pixelated;">
        <rect x="8" y="1" width="1" height="1" fill="#4B4B54"/>
        <rect x="12" y="1" width="1" height="1" fill="#4B4B54"/>
        <rect x="7" y="2" width="1" height="1" fill="#4B4B54"/>
        <rect x="8" y="2" width="1" height="1" fill="#7D7D8C"/>
        <rect x="9" y="2" width="1" height="1" fill="#4B4B54"/>
        <rect x="11" y="2" width="1" height="1" fill="#4B4B54"/>
        <rect x="12" y="2" width="1" height="1" fill="#7D7D8C"/>
        <rect x="13" y="2" width="1" height="1" fill="#4B4B54"/>
        <rect x="7" y="3" width="1" height="1" fill="#4B4B54"/>
        <rect x="8" y="3" width="1" height="1" fill="#FFAEAE"/>
        <rect x="9" y="3" width="1" height="1" fill="#7D7D8C"/>
        <rect x="10" y="3" width="1" height="1" fill="#4B4B54"/>
        <rect x="11" y="3" width="1" height="1" fill="#7D7D8C"/>
        <rect x="12" y="3" width="1" height="1" fill="#FFAEAE"/>
        <rect x="13" y="3" width="1" height="1" fill="#4B4B54"/>
        <rect x="6" y="4" width="1" height="1" fill="#4B4B54"/>
        <rect x="7" y="4" width="7" height="1" fill="#7D7D8C"/>
        <rect x="14" y="4" width="1" height="1" fill="#4B4B54"/>
        <rect x="6" y="5" width="1" height="1" fill="#4B4B54"/>
        <rect x="7" y="5" width="1" height="1" fill="#7D7D8C"/>
        <rect x="8" y="5" width="1" height="1" fill="#000"/>
        <rect x="9" y="5" width="3" height="1" fill="#7D7D8C"/>
        <rect x="12" y="5" width="1" height="1" fill="#000"/>
        <rect x="13" y="5" width="1" height="1" fill="#7D7D8C"/>
        <rect x="14" y="5" width="1" height="1" fill="#4B4B54"/>
        <rect x="8" y="9" width="5" height="1" fill="#00E3E3"/>
      </svg>
      <span class="label">focat</span>
      <button class="close-btn" id="closeBtn" onclick="event.stopPropagation(); handleDismiss()">✕</button>
    </div>
    <div class="message" id="messageText"></div>
    <div class="hint" id="hintText"></div>
  </div>

  <audio id="meowAudio" preload="auto"></audio>

  <script>
    const notifEl = document.getElementById('notification')
    const messageEl = document.getElementById('messageText')
    const hintEl = document.getElementById('hintText')
    const audioEl = document.getElementById('meowAudio')

    let autoDismissTimer = null

    // Receive notification data from main process
    window.focat.onShow((data) => {
      messageEl.textContent = data.message || ''
      hintEl.textContent = data.hint || ''

      // Set intensity level class
      notifEl.className = 'notification'
      if (data.level >= 3) {
        notifEl.classList.add('level-3')
      } else if (data.level >= 2) {
        notifEl.classList.add('level-2')
      }

      // Play meow sound
      if (data.meowFile) {
        audioEl.src = data.meowFile
        audioEl.volume = Math.min(1, 0.4 + (data.level || 0) * 0.2)
        audioEl.play().catch(() => {})
      }

      // Auto-dismiss after 15 seconds (longer for angrier notifications)
      const dismissDelay = 12000 + (data.level || 0) * 3000
      clearTimeout(autoDismissTimer)
      autoDismissTimer = setTimeout(handleDismiss, dismissDelay)
    })

    function handleClick() {
      clearTimeout(autoDismissTimer)
      window.focat.clicked()
    }

    function handleDismiss() {
      clearTimeout(autoDismissTimer)
      notifEl.classList.add('closing')
      setTimeout(() => {
        window.focat.dismissed()
      }, 300)
    }
  </script>
</body>
</html>
